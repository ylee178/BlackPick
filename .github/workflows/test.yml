name: test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: lint + typecheck + unit + component + i18n
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings=200

      - name: Typecheck
        run: npx tsc --noEmit

      - name: i18n key integrity
        run: npm run check:i18n

      - name: Unit tests
        run: npm run test:unit

      - name: Component contract tests
        run: npm run test:component

      - name: Production build
        run: npm run build
        env:
          # Provide minimal stub envs so the build doesn't crash on missing
          # required vars. Real values come from Vercel for production builds.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-key

  schema-drift:
    name: schema drift (dev vs prod)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only on push to main / manual dispatch — secrets aren't available on PRs
    # from forks, and we don't want to leak the Supabase PAT.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run schema drift check
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: node scripts/check-schema-drift.mjs

  smoke:
    name: post-deploy smoke (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # Run only after a push to main lands. This assumes Vercel has finished
    # deploying by the time this job runs; for stricter sequencing wire it as
    # a downstream of the Vercel deploy webhook.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [fast]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Wait for Vercel deploy to settle
        run: sleep 60

      - name: Smoke test against blackpick.io
        run: node scripts/smoke-prod.mjs
