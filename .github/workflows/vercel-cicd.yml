name: Vercel CI/CD

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

concurrency:
  group: vercel-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify build health
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      NEXT_PUBLIC_SITE_URL: https://ci.blackpick.local
      CORS_ALLOW_ORIGIN: http://localhost:3000,https://dev.blackpick.io,https://blackpick.io
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test:unit:coverage

      - name: Summarize unit coverage
        run: |
          node - <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require("fs");
          const summary = JSON.parse(fs.readFileSync("coverage/unit/coverage-summary.json", "utf8"));
          const total = summary.total;
          console.log("## Unit Coverage");
          console.log("");
          console.log(`- Statements: ${total.statements.pct}%`);
          console.log(`- Branches: ${total.branches.pct}%`);
          console.log(`- Functions: ${total.functions.pct}%`);
          console.log(`- Lines: ${total.lines.pct}%`);
          NODE

      - name: Upload unit coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/unit
          if-no-files-found: ignore

      - name: Build application
        run: npm run build

  deploy-dev:
    name: Deploy develop to dev.blackpick.io
    if: github.ref == 'refs/heads/develop' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    environment:
      name: development
      url: https://dev.blackpick.io
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull preview environment
        run: vercel pull --yes --environment=preview --git-branch=develop --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build preview deployment
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview deployment
        run: |
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} \
            -m githubDeployment=1 \
            -m githubCommitRef="${GITHUB_REF_NAME}" \
            -m githubOrg="${GITHUB_REPOSITORY_OWNER}" \
            -m githubRepo="${GITHUB_REPOSITORY#*/}" \
            -m githubCommitSha="${GITHUB_SHA}"

  deploy-prod:
    name: Deploy main to blackpick.io
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    environment:
      name: production
      url: https://blackpick.io
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull production environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production deployment
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production deployment
        run: |
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} \
            -m githubDeployment=1 \
            -m githubCommitRef="${GITHUB_REF_NAME}" \
            -m githubOrg="${GITHUB_REPOSITORY_OWNER}" \
            -m githubRepo="${GITHUB_REPOSITORY#*/}" \
            -m githubCommitSha="${GITHUB_SHA}"

  smoke-dev:
    name: Smoke test dev.blackpick.io
    if: github.ref == 'refs/heads/develop' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: deploy-dev
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run deployed smoke tests
        env:
          BASE_URL: https://dev.blackpick.io
        run: npm run test:e2e:smoke

      - name: Upload dev smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-dev
          path: |
            e2e/html-report
            e2e/test-results
          if-no-files-found: ignore

  smoke-prod:
    name: Smoke test blackpick.io
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: deploy-prod
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run deployed smoke tests
        env:
          BASE_URL: https://blackpick.io
        run: npm run test:e2e:smoke

      - name: Upload prod smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-prod
          path: |
            e2e/html-report
            e2e/test-results
          if-no-files-found: ignore
